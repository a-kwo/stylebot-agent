<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleBot — Tell us about yourself</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-track">
      <span>👗</span><span>👠</span><span>👜</span><span>💄</span>
      <span>👒</span><span>🕶️</span><span>💍</span><span>🧣</span>
      <span>👗</span><span>👠</span><span>👜</span><span>💄</span>
      <span>👒</span><span>🕶️</span><span>💍</span><span>🧣</span>
    </div>
  </aside>

  <div id="auth-container">
    <div class="auth-logo">
      <h1>StyleBot <span class="version">v.2</span></h1>
      <p>Tell us about yourself</p>
    </div>

    <form class="auth-form" id="onboard-form">
      <label for="gender" style="font-size:0.85rem;font-weight:500;color:#555;">Gender</label>
      <select id="gender" required style="width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:0.95rem;font-family:inherit;outline:none;background:#fff;">
        <option value="" disabled selected>Select…</option>
        <option value="Woman">Woman</option>
        <option value="Man">Man</option>
        <option value="Non-binary">Non-binary</option>
        <option value="Prefer not to say">Prefer not to say</option>
      </select>

      <label for="age" style="font-size:0.85rem;font-weight:500;color:#555;">Age</label>
      <input type="number" id="age" placeholder="Your age" min="13" max="120" required />

      <label for="climate" style="font-size:0.85rem;font-weight:500;color:#555;">Climate</label>
      <select id="climate" required style="width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:0.95rem;font-family:inherit;outline:none;background:#fff;">
        <option value="" disabled selected>Select…</option>
        <option value="Hot">Hot</option>
        <option value="Warm">Warm</option>
        <option value="Temperate">Temperate</option>
        <option value="Cold">Cold</option>
        <option value="Varies">Varies</option>
      </select>

      <p class="auth-error" id="onboard-error"></p>
      <button type="submit">Continue</button>
    </form>
  </div>

  <!-- Quiz overlay — lives outside auth-container to escape body flex -->
  <div id="quiz-overlay">
    <div class="quiz-inner">
      <div class="auth-logo" style="margin-bottom:24px;">
        <h1>StyleBot <span class="version">v.2</span></h1>
        <p>What's your style?</p>
      </div>
      <div class="quiz-container">
        <p class="quiz-progress" id="quiz-progress"></p>
        <p class="quiz-prompt" id="quiz-prompt"></p>
        <div class="quiz-grid" id="quiz-grid"></div>
        <button class="quiz-next-btn" id="quiz-next-btn" disabled>Next</button>
      </div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-track">
      <span>✨</span><span>🧥</span><span>👟</span><span>💎</span>
      <span>🪞</span><span>🎀</span><span>👔</span><span>🌸</span>
      <span>✨</span><span>🧥</span><span>👟</span><span>💎</span>
      <span>🪞</span><span>🎀</span><span>👔</span><span>🌸</span>
    </div>
  </aside>

  <script src="onboarding.js"></script>
</body>
</html>
